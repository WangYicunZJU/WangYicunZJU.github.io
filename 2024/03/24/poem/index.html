            <h1 id="seo-header">武道狂之诗</h1>
            
            
              <div class="markdown-body">
                
                <h1 id=""><a href="#" class="headerlink" title=""></a></h1><h1 id="卷八-破门六剑"><a href="#卷八-破门六剑" class="headerlink" title="卷八 破门六剑"></a>卷八 破门六剑</h1><h2 id="第八章-大旗"><a href="#第八章-大旗" class="headerlink" title="第八章 大旗"></a>第八章 大旗</h2><p><em>破门六剑的来历。</em></p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><code class="hljs">旗帜在晨风中飘动，可见上面以黑炭涂了四个歪歪斜斜的大字：<br>破门六剑<br>「我们几个不是失掉了门派，就是离家出走。」童静挤挤眼睛笑起来：「所以我就想到这么叫了。很贴切吧？」<br></code></pre></td></tr></table></figure>

<p><em>卷八后记，作者乔靖夫的话。</em></p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs">回想《武道狂》面世的几个月前，零八年夏季香港书展，我连新书都没有推出，好像彻底变成了局外人，陷于职业生涯的一次低谷。<br>不过这也让我看清了一个事实：写小说，是我唯一能够掌握、并以之证明自己存在价值的东西。就像剑，之于剑客。<br>如今回忆当时的心情，好像相隔很远。这部卷八出版的时候，《武道狂之诗》的漫画版已推出了，整个多媒体的改编计划开始启动。诚实的说，确是朝着梦想踏近了一步。<br>但同时也是新战斗的起点。就像荆裂的师叔说：什么都还没有完成啊。<br>将来的成败，无人能够预知；但正因为有过以前那十几年，未来不管是大起，还是大落，我想大概还是能够以平常心面对吧？就如先前的后记已经引用过一次的说话：人生的所有事情，没有一件是没用的。<br>然后，努力保持平稳的步调，继续去做忠于自己的事。<br>没有比这更好的方法。<br></code></pre></td></tr></table></figure>

<h1 id="卷九-铁血之阵"><a href="#卷九-铁血之阵" class="headerlink" title="卷九 铁血之阵"></a>卷九 铁血之阵</h1><p><em>引言，前文提要</em></p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs">前文提要<br><br>强大的武当派为实现「天下无敌，称霸武林」的宏愿而四出征伐。流浪武者荆裂与青城派少年剑士燕横矢志向武当复仇，途中巧遇爱剑少女童静、日本女剑士岛津虎玲兰、崆峒派前任掌门练飞虹及少林武僧圆性，六人结成同伴，号称「破门六剑」，一起踏上武道修练与江湖历险的旅程。<br><br>「破门六剑」于江西庐陵与一代大儒王守仁相交，当地正遭受前武当高手波龙术王一干妖匪蹂躏，百姓陷于水深火热。王守仁与六侠结盟，挺身对抗奸邪，连番血战之下诛杀术王多名亲信。「破门六剑」虽各自受伤不轻，但在恶斗中对武道有了全新领悟，武功大有进境。<br><br>正邪决战进入最后阶段，波龙术王欲借助地利以逸代劳，劫持数百无辜村民作人质，逼使王守仁离城出击。王守仁说得孟七河为首的一群勇猛山贼改邪归正，与「破门六剑」组成义军，火速向位于青原山的魔窟「清莲寺」进发……<br></code></pre></td></tr></table></figure>
